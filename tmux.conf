# Enable mouse support
set -g mouse on

# Enable OSC 52 clipboard support
set -s set-clipboard on
# Explicitly tell tmux that xterm-256color supports clipboard (for OSC 52)
set -as terminal-features ',xterm-256color:clipboard'

# Selection with mouse should copy to clipboard but NOT exit copy mode (stay selected)
# Use 'copy-pipe' to ensure it's sent via OSC 52 if set-clipboard is on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection

# Right-click on a pane to show a menu
bind-key -n MouseDown3Pane display-menu -t = -x M -y M \
    "Paste"          p "paste-buffer" \
    "" \
    "Horizontal Split" h "split-window -v" \
    "Vertical Split"   v "split-window -h" \
    "" \
    "New Window"       n "new-window" \
    "New Session"      s "new-session" \
    "Kill Pane"        x "kill-pane" \
    "" \
    "Reload Config"    r "source-file ~/.tmux.conf; display-message 'Config reloaded!'"

# Bind mouse click on status bar to show a menu
# Left-click on status line (at column 0) to open the menu
bind-key -n MouseDown1Status if-shell -F "#{==:#{mouse_status_line},0}" {
    display-menu -t = -x M -y W \
        "New Window"       n "new-window" \
        "New Session"      s "new-session" \
        "List Windows"     w "choose-tree -w" \
        "List Sessions"    S "choose-tree -s" \
        "Split Horizontal" h "split-window -v" \
        "Split Vertical"   v "split-window -h" \
        "Next Window"      p "next-window" \
        "Previous Window"  o "previous-window" \
        "" \
        "Enter Copy Mode"  c "copy-mode" \
        "Exit Copy Mode"   q "send-keys -X cancel" \
        "" \
        "Kill Pane"        k "kill-pane" \
        "Kill Window"      x "kill-window" \
        "Kill Session"     X "kill-session" \
        "" \
        "Reload Config"    r "source-file ~/.tmux.conf; display-message 'Config reloaded!'" \
        "Detach Session"   d "detach-client"
}

# Also bind a key to show the same menu
bind-key m display-menu -x P -y P \
    "New Window"       n "new-window" \
    "New Session"      s "new-session" \
    "List Windows"     w "choose-tree -w" \
    "List Sessions"    S "choose-tree -s" \
    "Split Horizontal" h "split-window -v" \
    "Split Vertical"   v "split-window -h" \
    "Next Window"      p "next-window" \
    "Previous Window"  o "previous-window" \
    "" \
    "Enter Copy Mode"  c "copy-mode" \
    "Exit Copy Mode"   q "send-keys -X cancel" \
    "" \
    "Kill Pane"        k "kill-pane" \
    "Kill Window"      x "kill-window" \
    "Kill Session"     X "kill-session" \
    "" \
    "Reload Config"    r "source-file ~/.tmux.conf; display-message 'Config reloaded!'" \
    "Detach Session"   d "detach-client"
